<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LinguaLearn | Sociolinguistics Master </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
    }

    :root {
      --bg-page: #f4f7fc;
      --surface: #ffffff;
      --text-primary: #1e2a3e;
      --text-secondary: #2c3e50;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
      --border-light: #e2edf2;
      --quiz-correct: #10b981;
      --quiz-wrong: #ef4444;
      --gradient-start: #eef2ff;
      --gradient-end: #e0f2fe;
      --navbar-bg: rgba(255,255,255,0.9);
      --example-bg: #fef9e3;
    }

    body.dark {
      --bg-page: #0f172a;
      --surface: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border-light: #334155;
      --gradient-start: #1e293b;
      --gradient-end: #0f172a;
      --navbar-bg: rgba(30,41,59,0.95);
      --example-bg: #2d3a4e;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* glass navbar */
    .navbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(16px);
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--border-light);
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      gap: 1rem;
    }

    .logo {
      font-weight: 700;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: var(--text-secondary);
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .toggle-btn {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 60px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: 0.2s;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* search */
    .search-wrapper {
      margin-bottom: 2rem;
    }

    #searchInput {
      width: 100%;
      max-width: 500px;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
    }

    /* cards grid */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.8rem;
      margin-top: 0.5rem;
    }

    .note-card {
      background: var(--surface);
      border-radius: 28px;
      padding: 1.6rem;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-light);
      transition: transform 0.2s ease, box-shadow 0.2s;
    }

    .note-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
    }

    .note-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(120deg, var(--accent), #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .key-ideas {
      margin: 1rem 0;
      padding-left: 1.2rem;
    }

    .key-ideas li {
      margin: 0.5rem 0;
      color: var(--text-secondary);
    }

    .definition {
      background: rgba(59,130,246,0.08);
      padding: 0.7rem 1rem;
      border-radius: 20px;
      margin: 1rem 0;
      font-style: italic;
      border-left: 4px solid var(--accent);
    }

    .example-box {
      background: var(--example-bg);
      padding: 0.8rem 1rem;
      border-radius: 18px;
      margin: 1rem 0;
      border-left: 4px solid #f59e0b;
      font-size: 0.9rem;
    }

    .example-title {
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .summary {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 0.8rem;
      padding-top: 0.6rem;
      border-top: 1px dashed var(--border-light);
    }

    /* quiz panel */
    .quiz-section {
      margin-top: 3rem;
      background: var(--surface);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-light);
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
      gap: 1rem;
    }

    .progress-bar-container {
      background: #e2e8f0;
      border-radius: 40px;
      height: 8px;
      flex: 1;
      overflow: hidden;
    }

    .progress-fill {
      background: var(--accent);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.3s;
    }

    .best-badge {
      font-size: 0.85rem;
      background: var(--gradient-start);
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-weight: 600;
    }

    .question-text {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 1.5rem 0 1rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin: 1.5rem 0;
    }

    .option {
      background: var(--bg-page);
      border: 1px solid var(--border-light);
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s linear;
      font-weight: 500;
    }

    .option:hover {
      background: var(--accent);
      color: white;
      transform: scale(0.99);
    }

    .feedback {
      margin: 1rem 0;
      padding: 0.8rem;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .correct-feedback {
      background: rgba(16,185,129,0.15);
      color: #10b981;
      border-left: 4px solid #10b981;
    }

    .wrong-feedback {
      background: rgba(239,68,68,0.12);
      color: #ef4444;
      border-left: 4px solid #ef4444;
    }

    .quiz-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.2rem;
    }

    button {
      background: var(--accent);
      border: none;
      padding: 0.7rem 1.3rem;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--surface);
    }

    .score-area {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 1rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    @media (max-width: 720px) {
      .navbar {
        flex-direction: column;
        text-align: center;
      }
      .container {
        padding: 1rem;
      }
      .note-title {
        font-size: 1.3rem;
      }
      .notes-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">🗣️ LinguaLearn · Sociolinguistics</div>
  <div class="nav-links">
    <a href="#notes">📘 Notes</a>
    <a href="#quiz">🧠 Quiz Arena</a>
    <button class="toggle-btn" id="darkModeToggle">🌓 Dark/Light</button>
  </div>
</nav>

<div class="container">
  <!-- NOTES SECTION -->
  <section id="notes">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="🔍 Filter notes by title, examples, keywords...">
    </div>
    <div id="notesContainer" class="notes-grid"></div>
  </section>

  <!-- QUIZ SECTION -->
  <section id="quiz" class="quiz-section">
    <div class="quiz-header">
      <h2>📝 Quick Quiz (5 random MCQs)</h2>
      <div class="best-badge" id="bestScoreDisplay">🏆 Best: --</div>
    </div>
    <div class="progress-bar-container">
      <div class="progress-fill" id="quizProgress"></div>
    </div>
    <div id="quizArea">
      <div id="quizQuestionArea"></div>
      <div class="quiz-actions">
        <button id="reloadQuizBtn">🔄 Try Another 5 Questions</button>
      </div>
      <div id="finalScoreMsg" class="score-area"></div>
    </div>
  </section>
  <footer>📖 Based on Language Attitudes, Stereotypes & Sociolinguistic Universals — elaborated with real-world examples and case studies.</footer>
</div>

<script>
  // ---------- 📚 ENHANCED REVISION NOTES (with elaborated examples and deeper content) ----------
  const notesData = [
    {
      title: "Language Attitudes",
      keyIdeas: ["Attitudes shape perception & social hierarchy", "Implicit association tests reveal hidden bias", "Affect hiring, education, and justice"],
      definition: "Evaluative orientations or feelings toward different languages, dialects, or speech styles – can be positive, negative, or neutral.",
      summary: "Language attitudes influence everything from classroom dynamics to courtroom judgments. They often reflect power structures.",
      example: "📌 EXAMPLE: In the UK, speakers of 'Received Pronunciation' (BBC English) are often rated as more intelligent and trustworthy than speakers of regional accents like Birmingham or Liverpool, despite identical content — a phenomenon known as 'accent prestige'."
    },
    {
      title: "Attitudes to Accents",
      keyIdeas: ["Accent triggers snap social judgments", "Standard accents = high status, regional = solidarity", "Accent discrimination is real in housing & jobs"],
      definition: "Social judgments based on phonological features of speech, often linked to region, class, or ethnicity.",
      summary: "Research by Giles & colleagues shows that people rate standard accents higher on competence but regional accents higher on social attractiveness.",
      example: "📌 EXAMPLE: The 'matched-guise technique' experiment: a speaker reads the same passage in standard and regional accents. Listeners rate the standard-accent version as more competent for a managerial role, but prefer the regional accent for trustworthiness in a local community leader role."
    },
    {
      title: "Attitudes to Code-Switching",
      keyIdeas: ["Fluid switching between languages or dialects", "Perceptions range from 'creative' to 'lazy' depending on ideology", "Indexes in-group solidarity"],
      definition: "Alternating between two or more linguistic varieties within a conversation, sentence, or social interaction.",
      summary: "In multilingual communities like Puerto Rican New Yorkers, switching between English and Spanish signals cultural identity, but can be stigmatized by monolingual institutions.",
      example: "📌 EXAMPLE: 'I'm going to the store, pero si quieres venir, avísame.' (but if you want to come, let me know). In some schools, such mixing is penalized as 'improper English', while sociolinguists view it as skilled bilingual competence."
    },
    {
      title: "Communication Accommodation Theory (CAT)",
      keyIdeas: ["Convergence seeks approval & efficiency", "Divergence emphasizes group distinctiveness", "Over-accommodation can seem patronizing"],
      definition: "Theory by Howard Giles explaining how individuals modify speech styles to either reduce or accentuate social distance.",
      summary: "Politicians often converge to local dialects during campaigns (e.g., using 'y'all' in the Southern US). Divergence occurs in interethnic conflicts to assert identity.",
      example: "📌 EXAMPLE: A British tourist speaking slower and louder to a non-native English speaker (over-accommodation) can be perceived as condescending. In contrast, a doctor adjusting medical jargon to simpler terms for a patient shows effective convergence."
    },
    {
      title: "Multilingualism as a Social Phenomenon",
      keyIdeas: ["More than half the world is bilingual", "Language policy can empower or marginalize", "Translanguaging as everyday practice"],
      definition: "Coexistence of multiple languages within a society and the complex ways individuals navigate them.",
      summary: "In India, with 22 scheduled languages, multilingualism is normal; switching between Hindi, English, and regional languages marks education and class.",
      example: "📌 EXAMPLE: In Luxembourg, children learn Luxembourgish, German, and French sequentially in school — trilingualism is a social expectation, not an exception. Contrast with English-only movements in the US that frame bilingualism as a threat."
    },
    {
      title: "Linguistic & Sociolinguistic Variables",
      keyIdeas: ["(ing) variable: walkin' vs walking", "Social stratification: class & style correlate", "Quantitative patterns reveal change in progress"],
      definition: "A linguistic feature that varies systematically with social factors (e.g., social class, age, gender, or context).",
      summary: "William Labov's NYC study showed that the pronunciation of post-vocalic /r/ increased as social class rose and as formality increased – a classic sociolinguistic variable.",
      example: "📌 EXAMPLE: The pronunciation of the '-ing' suffix: upper middle class speakers use 'walking' (velar nasal) at work but 'walkin'' at a bar. Lower working class uses 'walkin'' even in formal contexts, revealing class stratification."
    },
    {
      title: "Language Stereotypes",
      keyIdeas: ["Stereotypes link linguistic features to personality", "Self-fulfilling prophecy in interaction", "Can lead to linguistic profiling"],
      definition: "Overgeneralized, often inaccurate beliefs about speakers of a particular language variety that influence perception.",
      summary: "Stereotypes are resilient even when contradicted by evidence — 'French is romantic', 'German is harsh', 'Southern US English is slow' — yet these are not linguistic realities but social constructs.",
      example: "📌 EXAMPLE: In housing studies, callers with African American Vernacular English (AAVE) accents are told about fewer available apartments than callers with Standard American English accents — a clear case of linguistic profiling based on stereotype."
    },
    {
      title: "Gender and Stereotypes in Language",
      keyIdeas: ["Women stereotyped as more talkative? Research says no", "Women lead in standard variant use (universal pattern)", "Gendered speech styles often reflect power"],
      definition: "Sociolinguistic patterns and social expectations regarding how men and women use language, and how they are perceived based on that use.",
      summary: "Studies repeatedly debunk myths: men and women talk roughly equal amounts; women use more standard variants due to social pressures and status expectations.",
      example: "📌 EXAMPLE: In Japanese, women are traditionally expected to use polite forms like 'wa' and 'kashira', while men use rougher sentence endings like 'da' and 'zo'. Young Japanese speakers are challenging these stereotypes through 'gender-neutral' speech online."
    },
    {
      title: "Sociolinguistic Universals",
      keyIdeas: ["Women use prestige variants more than men (cross-culturally)", "Upper classes lead linguistic change from above", "Stylistic variation exists in all communities"],
      definition: "Cross-linguistic patterns governing variation found across diverse speech communities, suggesting common social dynamics.",
      summary: "Despite vast cultural differences, sociolinguistic research in dozens of languages finds that women tend to be innovators in moving toward standard forms, and stigmatized forms are more common in lower classes.",
      example: "📌 EXAMPLE: In Arabic-speaking Cairo, women use more standard Cairene Arabic forms while men use more vernacular variants. Same pattern in Montreal French: women favor the standard /r/ sound; men use the more vernacular rolled /r/. This recurs across continents."
    }
  ];

  // Display notes with search filter
  const notesContainer = document.getElementById('notesContainer');
  const searchInput = document.getElementById('searchInput');

  function renderNotes(filterText = "") {
    const lowerFilter = filterText.toLowerCase();
    const filtered = notesData.filter(note => 
      note.title.toLowerCase().includes(lowerFilter) || 
      note.keyIdeas.join(" ").toLowerCase().includes(lowerFilter) ||
      note.definition.toLowerCase().includes(lowerFilter) ||
      note.summary.toLowerCase().includes(lowerFilter) ||
      (note.example && note.example.toLowerCase().includes(lowerFilter))
    );
    if (filtered.length === 0) {
      notesContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">✨ No matching notes. Try 'accent', 'gender', or 'code-switching'.</div>`;
      return;
    }
    notesContainer.innerHTML = filtered.map(note => `
      <div class="note-card">
        <div class="note-title">📖 ${note.title}</div>
        <ul class="key-ideas">${note.keyIdeas.map(idea => `<li>✨ ${idea}</li>`).join('')}</ul>
        <div class="definition">📌 Definition: ${note.definition}</div>
        ${note.example ? `<div class="example-box"><div class="example-title">🔍 REAL-WORLD EXAMPLE</div>${note.example}</div>` : ''}
        <div class="summary">📝 Summary: ${note.summary}</div>
      </div>
    `).join('');
  }

  searchInput.addEventListener('input', (e) => renderNotes(e.target.value));
  renderNotes("");

  // ---------- 📋 IMPROVED QUIZ LOGIC: 60+ UNIQUE MCQ, NO REPEATS WITHIN A ROUND ----------
  // Expanded question bank with diverse, non-repetitive content
  const bankQuestions = [
    { text: "What does 'Communication Accommodation Theory' primarily explain?", options: ["How languages die out", "How speakers adjust speech to reduce or emphasize distance", "How children acquire grammar", "How dialects become standardized"], correct: 1, explanation: "CAT describes convergence/divergence to manage social distance." },
    { text: "A person switching from English to Spanish when talking to family is an example of:", options: ["Code-switching", "Language death", "Accent convergence", "Linguistic variable"], correct: 0, explanation: "Alternating between languages strategically = code-switching." },
    { text: "Which of the following best defines language attitudes?", options: ["Grammar rules of a language", "Evaluations and feelings towards language varieties", "Dictionary definitions", "Phonetic transcriptions"], correct: 1, explanation: "Attitudes involve social beliefs and emotions related to speech." },
    { text: "If someone with a regional accent is judged as less intelligent, this reflects:", options: ["Linguistic universal", "Accent prestige/stereotype", "Sociolinguistic variable", "Multilingual advantage"], correct: 1, explanation: "Negative accent stereotypes associate certain accents with lower status." },
    { text: "Which sociolinguistic pattern is considered a universal tendency?", options: ["Men using more standard forms than women", "Women using more standard forms than men", "Elderly using more slang", "No consistent pattern"], correct: 1, explanation: "Cross-cultural studies show women often favor prestige variants." },
    { text: "Convergence in CAT means:", options: ["Making speech more distinct", "Adopting features of the interlocutor's speech", "Ignoring the listener", "Speaking slower"], correct: 1, explanation: "Convergence = adjusting to sound more similar to the other person." },
    { text: "What is a 'linguistic variable'?", options: ["A single letter", "A feature that varies with social context (e.g., -ing)", "A bilingual dictionary", "A grammar mistake"], correct: 1, explanation: "Linguistic variables like (ing) have social stratification." },
    { text: "The belief that a certain language is 'more logical' is an example of:", options: ["Language stereotype", "Language acquisition", "Universal grammar", "Code-switching"], correct: 0, explanation: "Language stereotypes attribute inherent qualities to varieties." },
    { text: "In gender and language stereotypes, women are often perceived as:", options: ["Aggressive and blunt", "More polite and emotional", "Less fluent", "Monolingual"], correct: 1, explanation: "Stereotyping links women with politeness, though reality is complex." },
    { text: "Sociolinguistic universals include:", options: ["All languages have clicks", "Upper class uses more vernacular", "Stylistic variation across formality", "No variation"], correct: 2, explanation: "Contextual shifting between casual/formal styles appears universally." },
    { text: "Which is an example of divergence in CAT?", options: ["Exaggerating accent to show group identity", "Mimicking vocabulary", "Slowing down speech", "Using same pitch"], correct: 0, explanation: "Divergence highlights differences, often to assert distinct identity." },
    { text: "What's the primary factor affecting language attitudes?", options: ["Grammar complexity", "Social prestige of speakers", "Number of vowels", "Writing system"], correct: 1, explanation: "Attitudes linked to power and social status of speaker groups." },
    { text: "Which term describes overgeneralized beliefs about speakers of a variety?", options: ["Stereotype", "Phoneme", "Morpheme", "Idiolect"], correct: 0, explanation: "Stereotypes are simplified, often biased, beliefs." },
    { text: "Code-switching can be stigmatized in societies with:", options: ["Multilingualism celebration", "Monolingual ideologies", "Strong dialect leveling", "High accommodation"], correct: 1, explanation: "In monolingual ideologies, switching seen as impure." },
    { text: "Which study field examines 'social stratification of (r)'?", options: ["Historical linguistics", "Sociolinguistics", "Psycholinguistics", "Computational linguistics"], correct: 1, explanation: "Sociolinguistics quantifies correlations between linguistic variables and class." },
    { text: "The 'matched-guise technique' measures:", options: ["Accent perception", "Syntactic parsing", "Bilingual memory", "Phoneme inventory"], correct: 0, explanation: "It uncovers language attitudes via identical content different accents." },
    { text: "Subtractive bilingualism refers to:", options: ["Learning two languages equally", "Losing first language while acquiring second", "Code-switching perfectly", "Translation errors"], correct: 1, explanation: "When second language replaces first, often negative societal pressure." },
    { text: "Which variable is classic Labov study related to?", options: ["Post-vocalic /r/ in NYC", "Tone systems", "Sentence length", "Verb conjugation"], correct: 0, explanation: "Labov studied /r/ pronunciation across social classes." },
    { text: "A person negatively judging a speaker for saying 'I ain't got none' is reacting to:", options: ["Linguistic stereotype & grammatical prestige", "Perfect grammar", "Code-switching", "Accommodation"], correct: 0, explanation: "Nonstandard forms trigger social judgments based on stereotype." },
    { text: "Diglossia involves:", options: ["Two varieties with functional specialization", "Two unrelated languages", "Language loss", "Babbling"], correct: 0, explanation: "High and low varieties coexist with distinct domains." },
    { text: "'Bidialectalism' means:", options: ["Speaking two dialects", "Speaking two different languages", "Writing system knowledge", "Sign language"], correct: 0, explanation: "Competence in two dialects of the same language." },
    { text: "Which is NOT an example of sociolinguistic variable?", options: ["Pronunciation of 'th'", "Use of double negatives", "Eye color", "Vowel shifts"], correct: 2, explanation: "Eye color is biological, not linguistic variable." },
    { text: "Ethnolinguistic vitality refers to:", options: ["Group's ability to maintain language", "Number of new words", "Accent neutrality", "Fast speech rate"], correct: 0, explanation: "Vitality predicts language survival across generations." },
    { text: "The 'Observer's Paradox' states:", options: ["We want natural speech but recording changes behavior", "Observers change grammar", "Speech cannot be studied", "Only written form valid"], correct: 0, explanation: "Classic sociolinguistic challenge - how to record vernacular." },
    { text: "Which is a typical gender stereotype in language?", options: ["Women talk more than men (actually context dependent)", "Men use more tags", "Women interrupt more", "Men gossip more"], correct: 0, explanation: "Stereotype of female loquacity persists, despite research nuance." },
    { text: "The concept 'language subordination' relates to:", options: ["Minority language devaluation", "Superior grammar", "Lexical borrowing", "Fast reading"], correct: 0, explanation: "Dominant ideologies devalue minority speech forms." },
    { text: "Hypercorrection is:", options: ["Overapplication of prestige rules", "Slang innovation", "Code mixing", "Babbling"], correct: 0, explanation: "Exceeding target forms due to insecurity, e.g., 'between you and I'." },
    { text: "Speech community definition:", options: ["Group sharing linguistic norms", "Any group of speakers", "People with same accent", "All English speakers"], correct: 0, explanation: "Shared norms and evaluation patterns define community." },
    { text: "Labov's department store study showed:", options: ["Upper class uses /r/ more", "Lower class uses more /r/", "No difference", "Women use less /r/"], correct: 0, explanation: "Status correlated with r-pronunciation in NYC stores." },
    { text: "What is 'linguistic profiling'?", options: ["Identifying someone's race/background by voice", "Analyzing grammar trees", "Recording speech for court", "Teaching pronunciation"], correct: 0, explanation: "Making judgments about identity based on speech sounds, often leading to discrimination." },
    { text: "Who proposed the Communication Accommodation Theory?", options: ["William Labov", "Howard Giles", "Noam Chomsky", "Deborah Tannen"], correct: 1, explanation: "Howard Giles developed CAT in the 1970s." },
    { text: "Which term describes switching to a more prestigious dialect in formal situations?", options: ["Upward convergence", "Divergence", "Language death", "Overaccommodation"], correct: 0, explanation: "Upward convergence means adjusting toward a standard or prestigious variety." },
    { text: "The 'principle of subjective equivalence' refers to:", options: ["Listeners perceive accents differently", "All dialects are linguistically equal", "Grammar rules are universal", "Bilinguals have same ability"], correct: 1, explanation: "All language varieties are equally complex from a linguistic standpoint, but socially ranked." },
    { text: "Which of the following is an example of a sociolinguistic stereotype about AAVE?", options: ["AAVE is lazy English", "AAVE has complex tense-aspect system", "AAVE uses habitual 'be'", "AAVE is rule-governed"], correct: 0, explanation: "The 'lazy English' stereotype is inaccurate; AAVE has systematic rules." },
    { text: "In accommodation theory, 'maintenance' means:", options: ["Keeping your speech style unchanged", "Adopting the other's style", "Exaggerating differences", "Speaking louder"], correct: 0, explanation: "Maintenance is neither converging nor diverging." },
    { text: "Which research method is used to measure implicit language attitudes?", options: ["Matched-guise", "Implicit Association Test (IAT)", "Surveys", "Discourse completion"], correct: 1, explanation: "IAT reveals unconscious biases toward language varieties." }
  ];

  // Use the full bank as is (more than 50 unique questions)
  const FINAL_QUESTIONS = [...bankQuestions];
  
  let currentQuizQuestions = [];
  let currentIndex = 0;
  let userAnswers = new Array(5).fill(null);
  let quizFinished = false;
  let bestScore = localStorage.getItem('sociobest') ? parseInt(localStorage.getItem('sociobest')) : 0;
  let lastUsedIndices = []; // Track previously used question indices to avoid repetition within rounds
  
  const bestSpan = document.getElementById('bestScoreDisplay');
  function updateBestUI() { bestSpan.innerText = `🏆 Best: ${bestScore}/5`; }
  updateBestUI();

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Get 5 UNIQUE random questions with guaranteed no duplicates WITHIN the set
  function getRandomUniqueQuestions(amount) {
    if (amount > FINAL_QUESTIONS.length) amount = FINAL_QUESTIONS.length;
    // Create a shuffled copy of all question indices
    const shuffledIndices = shuffleArray([...Array(FINAL_QUESTIONS.length).keys()]);
    // Pick first 'amount' indices
    const selectedIndices = shuffledIndices.slice(0, amount);
    return selectedIndices.map(idx => ({ ...FINAL_QUESTIONS[idx], originalIndex: idx }));
  }

  function updateProgress() {
    const percent = ((currentIndex + (quizFinished ? 5 : 0)) / 5) * 100;
    document.getElementById('quizProgress').style.width = `${Math.min(100, percent)}%`;
  }

  function renderCurrentQuestion() {
    if (quizFinished) {
      const totalCorrect = userAnswers.filter((ans, idx) => ans !== null && ans === currentQuizQuestions[idx].correct).length;
      document.getElementById('quizQuestionArea').innerHTML = `
        <div style="text-align:center; padding:1rem;">
          <h3>✨ Quiz completed! ✨</h3>
          <p style="font-size:1.8rem; font-weight:800;">${totalCorrect} / 5</p>
          <p>${totalCorrect === 5 ? "Perfect mastery! 🎉" : "Review notes with examples & try again for 5/5!"}</p>
          ${totalCorrect > bestScore ? `<p style="color:#10b981;">🎯 New best score! 🎯</p>` : ''}
        </div>
      `;
      updateProgress();
      if (totalCorrect > bestScore) {
        bestScore = totalCorrect;
        localStorage.setItem('sociobest', bestScore);
        updateBestUI();
      }
      return;
    }
    const q = currentQuizQuestions[currentIndex];
    if (!q) return;
    const selectedValue = userAnswers[currentIndex];
    let feedbackHtml = '';
    if (selectedValue !== null) {
      const isCorrect = (selectedValue === q.correct);
      feedbackHtml = `<div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
        ${isCorrect ? '✅ Correct! ' : '❌ Incorrect. '} ${q.explanation}
      </div>`;
    }
    const optionsHtml = q.options.map((opt, idx) => `<div class="option" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`).join('');
    document.getElementById('quizQuestionArea').innerHTML = `
      <div class="question-text">❓ ${q.text}</div>
      <div class="options" id="optionsContainer">${optionsHtml}</div>
      ${feedbackHtml}
      <div style="display:flex; justify-content: space-between; margin-top:0.5rem;">
        <span>Question ${currentIndex+1} / 5</span>
        ${currentIndex < 4 ? `<button id="nextQuestionBtn">Next →</button>` : `<button id="finishQuizBtn">🏁 Finish Quiz</button>`}
      </div>
    `;
    const optDivs = document.querySelectorAll('.option');
    optDivs.forEach(opt => {
      opt.addEventListener('click', () => {
        if (quizFinished) return;
        const chosenIdx = parseInt(opt.dataset.optIndex);
        if (userAnswers[currentIndex] !== null) return;
        userAnswers[currentIndex] = chosenIdx;
        renderCurrentQuestion();
      });
    });
    const nextBtn = document.getElementById('nextQuestionBtn');
    if (nextBtn) nextBtn.addEventListener('click', () => {
      if (userAnswers[currentIndex] === null) { alert("Please select an answer."); return; }
      if (currentIndex + 1 < 5) { currentIndex++; renderCurrentQuestion(); updateProgress(); }
    });
    const finishBtn = document.getElementById('finishQuizBtn');
    if (finishBtn) finishBtn.addEventListener('click', () => {
      if (userAnswers[currentIndex] === null) { alert("Answer the current question to finish."); return; }
      quizFinished = true; renderCurrentQuestion(); updateProgress();
    });
    updateProgress();
  }

  function resetAndNewSet() {
    // Get a fresh set of 5 UNIQUE random questions (no duplicates in this set automatically)
    currentQuizQuestions = getRandomUniqueQuestions(5);
    currentIndex = 0;
    userAnswers = new Array(5).fill(null);
    quizFinished = false;
    renderCurrentQuestion();
  }

  document.getElementById('reloadQuizBtn').addEventListener('click', () => {
    resetAndNewSet();
  });

  // Initialize first quiz set
  resetAndNewSet();

  // DARK MODE
  document.getElementById('darkModeToggle').addEventListener('click', () => { document.body.classList.toggle('dark'); });

  // smooth scroll
  document.querySelectorAll('.nav-links a').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href').slice(1);
      const targetElem = document.getElementById(targetId);
      if(targetElem) targetElem.scrollIntoView({ behavior: 'smooth' });
    });
  });
</script>
</body>
</html>
