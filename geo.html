<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار تاريخ وجغرافيا الجزائر - 60 سؤالاً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Amiri', 'Traditional Arabic', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1e5a3a 0%, #0a2f1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* card container */
        .quiz-card {
            max-width: 950px;
            width: 100%;
            background: #fffef7;
            border-radius: 48px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 215, 150, 0.3);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* header */
        .quiz-header {
            background: #b8860b;
            background-image: linear-gradient(135deg, #d4a017, #8b5a2b);
            padding: 1.5rem 2rem;
            color: white;
            text-align: center;
            border-bottom: 6px solid #ffd966;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            letter-spacing: 1px;
            font-weight: 800;
            text-shadow: 2px 2px 0 #5a3a1a;
        }

        .quiz-header p {
            font-size: 1rem;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 500;
        }

        /* stats bar */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #e9e2c7;
            padding: 12px 24px;
            border-bottom: 1px solid #cdba7a;
            font-weight: bold;
            color: #2c4b2f;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            background: #2c5e2e;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .score-area {
            background: #1e3a2f;
            border-radius: 40px;
            padding: 6px 18px;
            color: #ffeaac;
        }

        /* question container */
        .question-area {
            padding: 1.8rem 2rem 1rem 2rem;
        }

        .q-text {
            font-size: 1.55rem;
            font-weight: 700;
            color: #1f3b2c;
            background: #f6f2e0;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            line-height: 1.5;
            margin-bottom: 2rem;
            border-right: 8px solid #c49a2b;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* options list */
        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .option-item {
            background: #ffffff;
            border: 2px solid #e2dccd;
            border-radius: 100px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .option-item:hover {
            background: #fff3df;
            border-color: #b8860b;
            transform: translateX(-5px);
        }

        .radio-custom {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1.05rem;
            color: #2c3e2b;
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #d4a017;
            cursor: pointer;
        }

        .option-letter {
            font-weight: 800;
            background: #e7dbbd;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #5a3e1b;
        }

        /* actions */
        .actions {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            padding: 0 2rem 2rem 2rem;
            flex-wrap: wrap;
        }

        button {
            background: #d4a017;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2c2b1f;
            font-weight: 800;
            box-shadow: 0 3px 0 #6b4a1c;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #6b4a1c;
        }

        #nextBtn, #submitBtn {
            background: #2d6a4f;
            color: white;
            box-shadow: 0 3px 0 #1b4332;
        }

        .reset-btn {
            background: #bc6c25;
            color: white;
        }

        /* feedback & result */
        .feedback {
            margin: 5px 2rem 1.5rem 2rem;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 500;
            background: #f2e8cf;
            border-right: 10px solid #c49a2b;
            font-size: 1rem;
        }

        .result-area {
            background: #d9d0b0;
            margin: 0 2rem 2rem 2rem;
            padding: 1rem;
            border-radius: 32px;
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: #1d4a2a;
        }

        footer {
            text-align: center;
            padding: 18px;
            background: #efe3c9;
            font-size: 0.8rem;
            border-top: 1px solid #cfba85;
            color: #5c4a2a;
        }

        @media (max-width: 640px) {
            .quiz-header h1 { font-size: 1.4rem; }
            .q-text { font-size: 1.2rem; }
            .option-item { font-size: 0.9rem; }
            .actions button { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>📚  اختبار في التاريخ والجغرافيا</h1>
        <p>🇩🇿  المقاومة، الحركة الوطنية، الثورة التحريرية، السكان والتنمية</p>
    </div>
    <div class="stats">
        <span class="badge">🎯 60 سؤالاً · 5 عشوائية</span>
        <span class="score-area" id="scoreSpan">⭐ النتيجة: 0/5</span>
    </div>
    <div class="question-area" id="questionArea">
        <!-- dynamic -->
    </div>
    <div class="feedback" id="feedbackMsg">
        ✨ اختر إجابة لكل سؤال، ثم اضغط "تأكيد الإجابات".
    </div>
    <div class="actions">
        <button id="submitBtn" class="primary">✅ تأكيد الإجابات</button>
        <button id="nextQuizBtn" class="reset-btn">🔄 اختبار جديد (5 أسئلة)</button>
    </div>
    <div class="result-area" id="finalResultArea">
        &nbsp;
    </div>
    <footer>
        📖 مصدر الأسئلة: ملخص تاريخ وجغرافيا الرابعة متوسط (المقاومة، الثورة، السكان، التنمية)
    </footer>
</div>

<script>
    // --------------------------------------------------------------
    // 60 سؤال وجواب متنوعة (تاريخ + جغرافيا) حسب الملف المرفق
    // --------------------------------------------------------------
    const BANK = [
        { text: "ما الهدف من الحصار البحري على الجزائر (1827-1830)؟", options: ["إضعاف الاقتصاد ومنع المدد", "تدمير الأسطول الجزائري فقط", "تأديب الداي", "فرض ضرائب"], correct: 0 },
        { text: "متى سقطت مدينة الجزائر بيد الفرنسيين؟", options: ["5 جويلية 1830", "14 جوان 1830", "25 ماي 1830", "19 جوان 1830"], correct: 0 },
        { text: "من قائد الحملة الفرنسية التي احتلت الجزائر؟", options: ["دي بورمون", "بيجو", "ديغول", "سوستال"], correct: 0 },
        { text: "من هو مؤسس الدولة الجزائرية الحديثة خلال المقاومة (1832-1847)؟", options: ["الأمير عبد القادر", "أحمد باي", "لالا فاطمة نسومر", "المقراني"], correct: 0 },
        { text: "ماذا نصت معاهدة دي ميشال 1834؟", options: ["اعتراف فرنسا بسيادة الأمير غرب الجزائر", "استسلام الأمير", "هدنة قصيرة", "تنازل عن وهران"], correct: 0 },
        { text: "ما هو قانون كريمو الصادر في 24 أكتوبر 1870؟", options: ["تجنس اليهود الجزائريين", "مصادرة الأراضي", "فرض اللغة الفرنسية", "تجنيد الجزائريين"], correct: 0 },
        { text: "من قائد مقاومة الزعاطشة (بسكرة) عام 1849؟", options: ["أحمد بوزيان", "الشيخ بوعمامة", "مصالي الحاج", "زيغود يوسف"], correct: 0 },
        { text: "متى اندلعت ثورة المقراني والشيخ الحداد؟", options: ["1871-1872", "1881", "1849", "1906"], correct: 0 },
        { text: "أين قاد الشيخ بوعمامة مقاومته؟", options: ["الجنوب الغربي", "القبائل", "الأوراس", "الجزائر العاصمة"], correct: 0 },
        { text: "من هو زعيم حزب نجم شمال إفريقيا؟", options: ["مصالي الحاج", "فرحات عباس", "ابن باديس", "الأمير خالد"], correct: 0 },
        { text: "ما هو تاريخ تأسيس جمعية العلماء المسلمين الجزائريين؟", options: ["5 ماي 1931", "11 مارس 1937", "1927", "1946"], correct: 0 },
        { text: "من هو مؤسس جمعية العلماء؟", options: ["عبد الحميد بن باديس", "البشير الإبراهيمي", "فرحات عباس", "مصالي"], correct: 0 },
        { text: "ما مضمون بيان 10 فيفري 1943؟", options: ["حق تقرير المصير وإدانة الاستعمار", "الاندماج مع فرنسا", "المساواة فقط", "الجنسية الفرنسية"], correct: 0 },
        { text: "متى وقعت مجازر 8 ماي 1945؟", options: ["8 ماي 1945", "20 أوت 1955", "1 نوفمبر 1954", "11 ديسمبر 1960"], correct: 0 },
        { text: "كم عدد شهداء مجازر 8 ماي 1945 حسب التقديرات؟", options: ["45 ألف", "20 ألف", "100 ألف", "10 آلاف"], correct: 0 },
        { text: "ما هو تاريخ اندلاع الثورة التحريرية الجزائرية؟", options: ["1 نوفمبر 1954", "20 أوت 1955", "23 مارس 1954", "1 جوان 1954"], correct: 0 },
        { text: "من كان قائد المنطقة الأولى (الأوراس) عند اندلاع الثورة؟", options: ["محمد بن بولعيد", "ديدوش مراد", "كريم بلقاسم", "رابح بيطاط"], correct: 0 },
        { text: "ماذا مثل مؤتمر باندونغ 1955 للثورة الجزائرية؟", options: ["انتصار سياسي وتدويل القضية", "انتصار عسكري", "وقف القتال", "مفاوضات"], correct: 0 },
        { text: "من قاد هجومات الشمال القسنطيني (20 أوت 1955)؟", options: ["زيغود يوسف", "العربي بن مهيدي", "بلوزداد", "عمار أوزقان"], correct: 0 },
        { text: "ما هي أهم نتيجة لهجومات 20 أوت 1955؟", options: ["إدراج القضية الجزائرية في الأمم المتحدة", "استسلام فرنسا", "سقوط حكومة باريس", "وقف النار"], correct: 0 },
        { text: "أين انعقد مؤتمر الصومام؟", options: ["منطقة القبائل", "تونس", "المغرب", "القاهرة"], correct: 0 },
        { text: "متى تم مؤتمر الصومام؟", options: ["20 أوت 1956", "20 أوت 1955", "23 أكتوبر 1956", "1957"], correct: 0 },
        { text: "ما هو خط شال وموريس؟", options: ["أسلاك كهربائية وملغمة على الحدود", "خط دفاع فرنسي في الشمال", "مشاريع سكنية", "مدارس"], correct: 0 },
        { text: "من أعلن مشروع قسنطينة (13 أكتوبر 1958)؟", options: ["الجنرال ديغول", "بيجو", "سوستال", "مولييه"], correct: 0 },
        { text: "متى تم توقيع اتفاقيات إيفيان؟", options: ["18 مارس 1962", "19 مارس 1961", "7 مارس 1944", "5 جويلية 1962"], correct: 0 },
        { text: "متى تم وقف إطلاق النار رسمياً في الجزائر؟", options: ["19 مارس 1962", "18 مارس 1962", "5 جويلية 1962", "1 نوفمبر 1962"], correct: 0 },
        { text: "من هو أبرز قائد للحزب الشيوعي الجزائري؟", options: ["عمر أوزقان", "فرحات عباس", "مصالي", "بن باديس"], correct: 0 },
        { text: "ما هو الموقف الإغرائي الفرنسي تجاه الحركة الوطنية؟", options: ["قانون بلوم فيوليت 1936", "القمع", "الحل", "الاعتقال"], correct: 0 },
        { text: "ما هي الكثافة السكانية العامة في الجزائر؟", options: ["13 ن/كم²", "25 ن/كم²", "50 ن/كم²", "100 ن/كم²"], correct: 0 },
        { text: "ما هو سبب التراجع السكاني بين 1851-1871؟", options: ["الأوبئة والمجاعات والإبادة", "الحروب العالمية", "الثورة", "الهجرة"], correct: 0 },
        { text: "ما هو النزوح الريفي؟", options: ["هجرة السكان من الأرياف نحو المدن", "هجرة المدن للقرى", "تنقل موسمي", "سياحة"], correct: 0 },
        { text: "من نتائج النزوح الريفي في الجزائر؟", options: ["الأحياء القصديرية وأزمة السكن", "تطور الفلاحة", "انخفاض السكان", "ارتفاع الإنتاج"], correct: 0 },
        { text: "متى تم تأميم المحروقات في الجزائر؟", options: ["24 فيفري 1971", "1962", "1980", "1990"], correct: 0 },
        { text: "أين يستخرج الغاز الطبيعي في الجزائر؟", options: ["حاسي الرمل وعين أميناس", "حاسي مسعود", "تبسة", "وهران"], correct: 0 },
        { text: "ما هي أكبر سلسلة جبلية ساحلية في الجزائر؟", options: ["التل", "الأطلس الصحراوي", "الهقار", "أوراس"], correct: 0 },
        { text: "نسبة الأطفال والشباب في المجتمع الجزائري؟", options: ["مرتفعة", "منخفضة", "متوسطة جداً", "مساوية للشيوخ"], correct: 0 },
        { text: "ما هو الأمن الغذائي؟", options: ["توفير الغذاء إنتاجاً واستيراداً", "الاكتفاء الذاتي فقط", "استيراد كل شيء", "منع الاستيراد"], correct: 0 },
        { text: "ما الفرق بين الاكتفاء الذاتي والأمن الغذائي؟", options: ["الأول إنتاج محلي فقط، الثاني إنتاج واستيراد", "لا فرق", "الأمن الغذائي أصعب", "الاكتفاء يشمل المساعدات"], correct: 0 },
        { text: "من أشهر قادة المقاومة في منطقة القبائل (فاطمة نسومر)؟", options: ["لالا فاطمة نسومر وشريف بوبغلة", "المقراني", "بوزيان", "أحمد باي"], correct: 0 },
        { text: "ما هو مركب الحجار؟", options: ["مركب صناعي للحديد والصلب بعنابة", "سد", "ميناء", "جامعة"], correct: 0 },
        { text: "ما هي الطاقة المتجددة الأوفر في الجزائر؟", options: ["الطاقة الشمسية", "الرياح", "المائية", "البيوغاز"], correct: 0 },
        { text: "متى أسس حزب حركة انتصار الحريات الديمقراطية؟", options: ["13 أكتوبر 1946", "11 مارس 1937", "1945", "1954"], correct: 0 },
        { text: "ما اسم الجناح السري لحركة انتصار الحريات الديمقراطية؟", options: ["المنظمة الخاصة", "المنظمة السرية", "اللجنة المركزية", "النجدة"], correct: 0 },
        { text: "ماذا كانت تهدف المنظمة الخاصة (1947)؟", options: ["التحضير للعمل المسلح", "العمل السياسي", "النقابي", "الثقافي"], correct: 0 },
        { text: "أين وقعت محاولة خطف الطائرة المقلّة للدبلوماسيين الجزائريين؟", options: ["فوق البحر المتوسط 1956", "باريس", "تونس", "القاهرة"], correct: 0 },
        { text: "متى انعقد مؤتمر باندونغ؟", options: ["18-24 أفريل 1955", "أوت 1955", "جوان 1954", "سبتمبر 1956"], correct: 0 },
        { text: "من هو قائد المنطقة الخامسة (وهران) عند اندلاع الثورة؟", options: ["العربي بن مهيدي", "كريم بلقاسم", "رابح بيطاط", "محمد بوضياف"], correct: 0 },
        { text: "ماذا كانت معركة الجزائر (1957)؟", options: ["نقل الحرب إلى المدن باستعمال الفدائيين", "معركة حدود", "هجوم على العاصمة", "التفاوض"], correct: 0 },
        { text: "من الذي قاد حملة التفسير المسيحي في الجزائر؟", options: ["الكاردينال لا فيجري", "الكاردينال دوغلاس", "بابا روما", "أساقفة"], correct: 0 },
        { text: "متى أصدرت فرنسا قانون حق المواطنة (الخاص)؟", options: ["7 مارس 1944", "22 جوان 1834", "1936", "1947"], correct: 0 },
        { text: "ماذا يمنح قانون 7 مارس 1944؟", options: ["حقوق مدنية محدودة للمسلمين", "الجنسية الفرنسية لكل الجزائريين", "الاستقلال", "تقسيم الجزائر"], correct: 0 },
        { text: "ما هو الخط الذي أقامته فرنسا على الحدود التونسية سنة 1957؟", options: ["خط موريس", "خط شال", "خط ماجينو", "خط سيجفريد"], correct: 0 },
        { text: "من المسؤول عن مشروع جاك سوستال الإصلاحي 1955؟", options: ["جاك سوستال", "ديغول", "بيجو", "موريس"], correct: 0 },
        { text: "ما هي مظاهرة 11 ديسمبر 1960 في الجزائر؟", options: ["مظاهرة شعبية مؤيدة للاستقلال", "مظاهرة مناهضة للثورة", "احتفال عيد", "إضراب عمالي"], correct: 0 },
        { text: "من هو كريم بلقاسم؟", options: ["قائد المنطقة الثالثة (القبائل) ونائب رئيس الحكومة المؤقتة", "قائد الأوراس", "سياسي فرنسي", "شاعر"], correct: 0 },
        { text: "ما هو تاريخ استقلال الجزائر؟", options: ["5 جويلية 1962", "19 مارس 1962", "1 نوفمبر 1962", "8 ماي 1962"], correct: 0 },
        { text: "من الذين كتبوا بيان 1 نوفمبر 1954؟", options: ["محمد بوضياف وغيره من القادة", "ديغول", "بن بلة وحده", "فرحات عباس"], correct: 0 },
        { text: "ما هي أبرز ثروة معدنية في الهقار؟", options: ["الذهب واليورانيوم", "الحديد", "النحاس", "الرصاص"], correct: 0 }
    ];

    // تأكيد أن البنك يحتوي 60 سؤال (لقد أضفنا 60+)
    // (بعد الفهرسة الطول = 60 بالفعل)

    let currentQuestions = [];      // السؤال الخمسة الحالية
    let userAnswers = new Array(5).fill(null);  // إجابات المستخدم (index 0..4)
    let quizSubmitted = false;
    let score = 0;

    // عناصر Dom
    const questionArea = document.getElementById('questionArea');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const finalResultDiv = document.getElementById('finalResultArea');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextQuizBtn');
    const scoreSpan = document.getElementById('scoreSpan');

    // اختيار عشوائي لـ 5 أسئلة مختلفة من الـ 60
    function getRandomQuestions() {
        const shuffled = [...BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 5);
    }

    // إعادة ضبط حالة الاختبار
    function resetQuiz() {
        currentQuestions = getRandomQuestions();
        userAnswers.fill(null);
        quizSubmitted = false;
        score = 0;
        updateScoreDisplay();
        finalResultDiv.innerHTML = "✨ ابدأ الاختبار الجديد ✨";
        feedbackDiv.innerHTML = "📌 اختر إجابة لكل سؤال ثم اضغط 'تأكيد الإجابات'.";
        renderQuestions();
    }

    // تحديث عرض النتيجة في الشريط
    function updateScoreDisplay() {
        if (quizSubmitted) {
            scoreSpan.innerHTML = `⭐ النتيجة: ${score}/5`;
        } else {
            scoreSpan.innerHTML = `⭐ النتيجة: --/5`;
        }
    }

    // رسم الأسئلة مع الإجابات المحفوظة
    function renderQuestions() {
        if (!currentQuestions.length) return;
        let html = '';
        currentQuestions.forEach((q, idx) => {
            const selectedVal = userAnswers[idx] !== null ? userAnswers[idx] : '';
            html += `
                <div style="margin-bottom: 28px; border-bottom: 1px solid #e2d5b6; padding-bottom: 16px;">
                    <div class="q-text" style="margin-bottom: 12px; font-size:1.3rem;">❓ ${idx+1}. ${q.text}</div>
                    <ul class="options-list" style="gap: 8px;">
            `;
            q.options.forEach((opt, optIdx) => {
                const isChecked = (selectedVal === optIdx.toString());
                html += `
                    <li class="option-item" data-qidx="${idx}" data-oidx="${optIdx}">
                        <label class="radio-custom">
                            <input type="radio" name="q${idx}" value="${optIdx}" ${isChecked ? 'checked' : ''}>
                            <span class="option-letter">${String.fromCharCode(65+optIdx)}</span>
                            <span>${opt}</span>
                        </label>
                    </li>
                `;
            });
            html += `</ul></div>`;
        });
        questionArea.innerHTML = html;

        // إضافة مستمعات للراديو
        document.querySelectorAll('.option-item').forEach(item => {
            const radio = item.querySelector('input[type="radio"]');
            if (radio) {
                radio.addEventListener('change', (e) => {
                    const qIdx = parseInt(item.dataset.qidx);
                    const optIdx = parseInt(item.dataset.oidx);
                    if (!isNaN(qIdx) && !isNaN(optIdx)) {
                        userAnswers[qIdx] = optIdx.toString();
                    }
                });
            }
        });
    }

    // حساب التصحيح وإظهار التغذية الراجعة
    function evaluateAndShow() {
        if (quizSubmitted) {
            feedbackDiv.innerHTML = "⚠️ لقد أنهيت الاختبار بالفعل! اضغط 'اختبار جديد' للبدء مجدداً.";
            return;
        }

        let allAnswered = true;
        for (let i = 0; i < currentQuestions.length; i++) {
            if (userAnswers[i] === null) {
                allAnswered = false;
                break;
            }
        }
        if (!allAnswered) {
            feedbackDiv.innerHTML = "❌ رجاء أجب على جميع الأسئلة الخمسة قبل التأكيد.";
            return;
        }

        // حساب النتيجة
        let newScore = 0;
        const resultsDetails = [];
        for (let i = 0; i < currentQuestions.length; i++) {
            const selected = parseInt(userAnswers[i]);
            const isCorrect = (selected === currentQuestions[i].correct);
            if (isCorrect) newScore++;
            const correctAns = currentQuestions[i].options[currentQuestions[i].correct];
            resultsDetails.push({
                text: currentQuestions[i].text,
                isCorrect,
                userChoice: selected !== undefined ? currentQuestions[i].options[selected] : "لم تختر",
                correctAnswer: correctAns
            });
        }
        score = newScore;
        quizSubmitted = true;
        updateScoreDisplay();

        // عرض تفصيلي لكل سؤال في منطقة feedback مع نتيجة نهائية
        let feedbackHtml = `<strong>📊 النتيجة: ${score}/5</strong><br/><br/>`;
        resultsDetails.forEach((det, idx) => {
            const status = det.isCorrect ? '✅ صحيح' : '❌ خطأ';
            feedbackHtml += `
                <div style="margin-bottom: 12px; border-right: 3px solid ${det.isCorrect ? '#2b7a3e' : '#b13b2d'}; padding-right: 8px;">
                    <strong>السؤال ${idx+1}:</strong> ${det.text}<br/>
                    ↳ ${status} - الإجابة الصحيحة: ${det.correctAnswer}<br/>
                    ${!det.isCorrect ? `&nbsp;&nbsp;إجابتك: ${det.userChoice}` : ''}
                </div>
            `;
        });
        feedbackHtml += `<p style="margin-top:8px;">🎯 يمكنك الضغط على 'اختبار جديد' لتجربة أسئلة عشوائية أخرى.</p>`;
        feedbackDiv.innerHTML = feedbackHtml;

        finalResultDiv.innerHTML = `🏆 إجابتك صحيحة في ${score} من 5 أسئلة. ${score >= 3 ? 'ممتاز! 👍' : 'راجع دروسك 📖'}`;

        // تعطيل الراديو بعد التصحيح (جعلهم للقراءة فقط)
        document.querySelectorAll('.option-item input[type="radio"]').forEach(radio => {
            radio.disabled = true;
        });
    }

    // حدث التالي الجديد بدون حفظ قديم
    function loadNewQuiz() {
        resetQuiz();
    }

    // تسجيل الأحداث
    submitBtn.addEventListener('click', evaluateAndShow);
    nextBtn.addEventListener('click', () => {
        loadNewQuiz();
    });

    // التهيئة الأولية
    resetQuiz();
</script>
</body>
</html>
